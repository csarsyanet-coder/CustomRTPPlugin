    target-world: 'world_nether_resources'
    rtp-command: 'rtp world world_nether_resources'

  end:
    enabled: true
    permission: ''
    percent: 10
    minimum-balance: 1000
    max-cost: 50000
    target-world: 'world_the_end_resources'
    rtp-command: 'rtp world world_the_end_resources'
